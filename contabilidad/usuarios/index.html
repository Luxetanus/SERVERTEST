<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Usuarios</title><link rel="stylesheet" href="../assets/style.css?v=20260625b"></head><body><div class="layout"><div id="side"></div><div><header><h2>Usuarios</h2><p class="muted">Datos administrativos.</p></header><main><section class="card"><label>Nombre</label><input id="nom"><label>Servicio</label><input id="serv"><label>Profesional</label><input id="pro"><label>Pago por sesión</label><input id="pago" type="number"><label>Sesiones mensuales</label><input id="ses" type="number"><button onclick="guardar()">Guardar</button></section><section class="card"><div class="table"><table><thead><tr><th>Nombre</th><th>Servicio</th><th>Profesional</th><th class="right">Pago</th><th class="right">Sesiones</th><th class="right">Total</th><th>Acciones</th></tr></thead><tbody id="tbody"></tbody></table></div></section></main></div></div><script src="../assets/store.js?v=20260625b"></script><script>document.getElementById('side').outerHTML=sidebar('../');let db=load();function guardar(){let u={id:uid(),nombre:$('nom').value.trim(),servicio:$('serv').value.trim(),profesional:$('pro').value.trim(),pago:n($('pago').value),sesiones:n($('ses').value)};if(!u.nombre)return alert('Ingresa nombre.');db.usuarios.push(u);save(db);['nom','serv','pro','pago','ses'].forEach(x=>$(x).value='');render()}function borrar(id){db.usuarios=db.usuarios.filter(x=>x.id!==id);save(db);render()}function render(){$('tbody').innerHTML=db.usuarios.length?db.usuarios.map(u=>`<tr><td>${esc(u.nombre)}</td><td>${esc(u.servicio)}</td><td>${esc(u.profesional)}</td><td class="right">${money(u.pago)}</td><td class="right">${n(u.sesiones)}</td><td class="right">${money(n(u.pago)*n(u.sesiones))}</td><td><button class="small danger" onclick="borrar('${u.id}')">Eliminar</button></td></tr>`).join(''):'<tr><td colspan="7">Sin registros.</td></tr>'}render();</script></body></html>
