<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Caja</title><link rel="stylesheet" href="../assets/style.css?v=20260625b"></head><body><div class="layout"><div id="side"></div><div><header><h2>Caja</h2><p class="muted">Resumen de ingresos por día.</p></header><main><section class="card"><label>Fecha</label><input id="fecha" type="date" data-today onchange="render()"><div class="grid" id="kpis" style="margin-top:14px"></div></section><section class="card"><div class="table"><table><thead><tr><th>Usuario</th><th>Profesional</th><th>Servicio</th><th>Método</th><th class="right">Cobrado</th></tr></thead><tbody id="tbody"></tbody></table></div></section></main></div></div><script src="../assets/store.js?v=20260625b"></script><script>document.getElementById('side').outerHTML=sidebar('../');let db=load();initDates();function render(){let f=$('fecha').value||today(),rows=db.atenciones.filter(a=>a.fecha===f),tot={};rows.forEach(a=>tot[a.metodo]=(tot[a.metodo]||0)+cob(a));let keys=Object.keys(tot),total=Object.values(tot).reduce((s,x)=>s+x,0);$('kpis').innerHTML=(keys.length?keys:['Sin movimientos']).map(x=>`<div class="stat"><span>${x}</span><strong>${money(tot[x]||0)}</strong></div>`).join('')+`<div class="stat ok"><span>Total</span><strong>${money(total)}</strong></div>`;$('tbody').innerHTML=rows.length?rows.map(a=>`<tr><td>${esc(a.usuario)}</td><td>${esc(a.profesional)}</td><td>${esc(a.servicio)}</td><td>${esc(a.metodo)}</td><td class="right">${money(cob(a))}</td></tr>`).join(''):'<tr><td colspan="5">Sin movimientos.</td></tr>'}render();</script></body></html>
