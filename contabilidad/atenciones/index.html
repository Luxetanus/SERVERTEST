<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Atenciones</title><link rel="stylesheet" href="../assets/style.css"></head><body><div class="layout"><div id="side"></div><div><header><h2>Atenciones</h2><p class="muted">Registrar, editar, duplicar y controlar estado de pago.</p></header><main><section class="card"><h2 id="title">Nueva atención</h2><input id="edit" type="hidden"><div class="grid2"><div><label>Fecha</label><input id="fecha" type="date" data-today><label>Usuario</label><input id="usuario" list="usuarios"><datalist id="usuarios" data-users></datalist><label>Profesional</label><input id="profesional" list="pros"><datalist id="pros" data-pros></datalist><label>Servicio</label><input id="servicio" list="servs"><datalist id="servs" data-servs></datalist></div><div><label>Método</label><select id="metodo"><option>Transferencia</option><option>Débito</option><option>Crédito</option><option>Efectivo</option><option>PAC</option><option>Subvención</option><option>Otro</option></select><label>Estado</label><select id="estado"><option value="pagado">Pagado</option><option value="deuda">Debe</option><option value="abonado">Abonado</option></select><label>Arancel</label><input id="arancel" type="number"><label>Abono</label><input id="abono" type="number" value="0"><div class="grid2"><div><label>% institución</label><input id="porcentaje" type="number" value="30"></div><div><label>% retención</label><input id="retencion" type="number" value="15.25"></div></div><label>Boleta/respaldo</label><select id="boleta"><option value="pendiente">Pendiente</option><option value="emitida">Emitida</option><option value="no_aplica">No aplica</option></select></div></div><label>Observación administrativa</label><textarea id="obs"></textarea><div class="toolbar"><button onclick="guardar()">Guardar</button><button class="secondary" onclick="limpiar()">Limpiar</button></div></section><section class="card"><h2>Listado</h2><div class="filters"><div><label>Buscar</label><input id="buscar" oninput="render()"></div><div><label>Estado</label><select id="fEstado" onchange="render()"><option value="todos">Todos</option><option value="pagado">Pagado</option><option value="deuda">Debe</option><option value="abonado">Abonado</option></select></div></div><div class="table" style="margin-top:12px"><table><thead><tr><th>Fecha</th><th>Usuario</th><th>Profesional</th><th>Servicio</th><th>Estado</th><th class="right">Arancel</th><th class="right">Abono</th><th class="right">Deuda</th><th>Liquidación</th><th>Acciones</th></tr></thead><tbody id="tbody"></tbody></table></div></section></main></div></div><script src="../assets/store.js"></script><script>document.getElementById('side').outerHTML=sidebar('../');let db=load();initDates();fillLists(db);function limpiar(){['edit','usuario','profesional','servicio','arancel','obs'].forEach(x=>$(x).value='');$('fecha').value=today();$('abono').value=0;$('porcentaje').value=30;$('retencion').value=15.25;$('estado').value='pagado';$('boleta').value='pendiente';$('title').textContent='Nueva atención'}function guardar(){let id=$('edit').value;let a={id:id||uid(),fecha:$('fecha').value||today(),usuario:$('usuario').value.trim(),profesional:$('profesional').value.trim(),servicio:$('servicio').value.trim(),metodo:$('metodo').value,estado:$('estado').value,arancel:n($('arancel').value),abono:n($('abono').value),porcentaje:n($('porcentaje').value),retencion:n($('retencion').value),boleta:$('boleta').value,obs:$('obs').value.trim(),liquidado:false};if(!a.usuario||!a.profesional||!a.servicio||!a.arancel)return alert('Completa usuario, profesional, servicio y arancel.');if(a.estado==='pagado')a.abono=a.arancel;if(id){let old=db.atenciones.find(x=>x.id===id);a.liquidado=old?.liquidado||false;db.atenciones=db.atenciones.map(x=>x.id===id?a:x)}else db.atenciones.push(a);save(db);limpiar();fillLists(db);render()}function editar(id){let a=db.atenciones.find(x=>x.id===id);Object.keys(a).forEach(k=>{if($(k))$(k).value=a[k]});$('edit').value=id;$('title').textContent='Editar atención';location.hash='top'}function duplicar(id){let a=db.atenciones.find(x=>x.id===id);db.atenciones.push({...a,id:uid(),fecha:today(),liquidado:false});save(db);render()}function borrar(id){if(confirm('¿Eliminar atención?')){db.atenciones=db.atenciones.filter(x=>x.id!==id);save(db);render()}}function render(){let q=$('buscar').value.toLowerCase(),e=$('fEstado').value;let rows=db.atenciones.filter(a=>(e==='todos'||a.estado===e)&&(!q||[a.usuario,a.profesional,a.servicio].join(' ').toLowerCase().includes(q))).sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));$('tbody').innerHTML=rows.length?rows.map(a=>`<tr><td>${a.fecha}</td><td>${esc(a.usuario)}</td><td>${esc(a.profesional)}</td><td>${esc(a.servicio)}</td><td><span class="estado ${a.estado}">${a.estado}</span></td><td class="right">${money(a.arancel)}</td><td class="right">${money(cob(a))}</td><td class="right">${money(deuda(a))}</td><td>${a.liquidado?'<span class="pill">Liquidada</span>':'<span class="pill">Pendiente</span>'}</td><td><button class="small" onclick="editar('${a.id}')">Editar</button><button class="small secondary" onclick="duplicar('${a.id}')">Duplicar</button><button class="small danger" onclick="borrar('${a.id}')">Eliminar</button></td></tr>`).join(''):'<tr><td colspan="10">Sin atenciones.</td></tr>'}document.addEventListener('change',e=>{if(e.target.id==='usuario'){let u=db.usuarios.find(x=>x.nombre.toLowerCase()===$('usuario').value.trim().toLowerCase());if(u){$('servicio').value=u.servicio;$('profesional').value=u.profesional;$('arancel').value=u.pago}}if(e.target.id==='servicio'){let a=db.aranceles.find(x=>x.servicio.toLowerCase()===$('servicio').value.trim().toLowerCase()&&n(x.valor)>0);if(a)$('arancel').value=a.valor}if(e.target.id==='estado'&&$('estado').value==='pagado')$('abono').value=$('arancel').value||0});render();</script></body></html>
