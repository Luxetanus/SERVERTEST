<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Deudas</title><link rel="stylesheet" href="../assets/style.css"></head><body><div class="layout"><div id="side"></div><div><header><h2>Deudas</h2><p class="muted">Seguimiento de saldos pendientes.</p></header><main><section class="card"><div class="filters"><div><label>Buscar</label><input id="buscar" oninput="render()"></div><div><label>Orden</label><select id="orden" onchange="render()"><option value="monto">Mayor monto</option><option value="fecha">Más antigua</option><option value="usuario">Usuario</option></select></div></div></section><section class="card"><div class="table"><table><thead><tr><th>Fecha</th><th>Usuario</th><th>Profesional</th><th>Servicio</th><th class="right">Arancel</th><th class="right">Abono</th><th class="right">Saldo</th><th>Acciones</th></tr></thead><tbody id="tbody"></tbody></table></div></section></main></div></div><script src="../assets/store.js"></script><script>document.getElementById('side').outerHTML=sidebar('../');let db=load();function pagar(id){let a=db.atenciones.find(x=>x.id===id);if(a&&confirm('¿Marcar pagado?')){a.estado='pagado';a.abono=n(a.arancel);save(db);render()}}function abonar(id){let a=db.atenciones.find(x=>x.id===id),mto=n(prompt('Monto de abono',deuda(a)));if(a&&mto>0){a.abono=Math.min(cob(a)+mto,n(a.arancel));a.estado=a.abono>=n(a.arancel)?'pagado':'abonado';save(db);render()}}function render(){let q=$('buscar').value.toLowerCase(),rows=db.atenciones.filter(a=>deuda(a)>0&&(!q||[a.usuario,a.profesional,a.servicio].join(' ').toLowerCase().includes(q)));if($('orden').value==='monto')rows.sort((a,b)=>deuda(b)-deuda(a));if($('orden').value==='fecha')rows.sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''));if($('orden').value==='usuario')rows.sort((a,b)=>(a.usuario||'').localeCompare(b.usuario||''));$('tbody').innerHTML=rows.length?rows.map(a=>`<tr><td>${a.fecha}</td><td>${esc(a.usuario)}</td><td>${esc(a.profesional)}</td><td>${esc(a.servicio)}</td><td class="right">${money(a.arancel)}</td><td class="right">${money(cob(a))}</td><td class="right"><b>${money(deuda(a))}</b></td><td><button class="small ok" onclick="pagar('${a.id}')">Pagado</button><button class="small warn" onclick="abonar('${a.id}')">Abonar</button></td></tr>`).join(''):'<tr><td colspan="8">No hay deudas.</td></tr>'}render();</script></body></html>
