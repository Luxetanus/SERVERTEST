<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Profesionales</title><link rel="stylesheet" href="../assets/style.css"></head><body><div class="layout"><div id="side"></div><div><header><h2>Profesionales</h2><p class="muted">Porcentajes y retención.</p></header><main><section class="card"><label>Nombre</label><input id="nom"><label>Área</label><input id="area"><label>% institución</label><input id="por" type="number" value="30"><label>% retención</label><input id="ret" type="number" value="15.25"><button onclick="guardar()">Guardar</button></section><section class="card"><div class="table"><table><thead><tr><th>Nombre</th><th>Área</th><th class="right">% institución</th><th class="right">% retención</th><th>Acciones</th></tr></thead><tbody id="tbody"></tbody></table></div></section></main></div></div><script src="../assets/store.js"></script><script>document.getElementById('side').outerHTML=sidebar('../');let db=load();function guardar(){let p={id:uid(),nombre:$('nom').value.trim(),area:$('area').value.trim(),porcentaje:n($('por').value),retencion:n($('ret').value)};if(!p.nombre)return alert('Ingresa nombre.');db.profesionales.push(p);save(db);['nom','area'].forEach(x=>$(x).value='');$('por').value=30;$('ret').value=15.25;render()}function borrar(id){db.profesionales=db.profesionales.filter(x=>x.id!==id);save(db);render()}function render(){$('tbody').innerHTML=db.profesionales.length?db.profesionales.map(p=>`<tr><td>${esc(p.nombre)}</td><td>${esc(p.area)}</td><td class="right">${n(p.porcentaje)}%</td><td class="right">${n(p.retencion)}%</td><td><button class="small danger" onclick="borrar('${p.id}')">Eliminar</button></td></tr>`).join(''):'<tr><td colspan="5">Sin registros.</td></tr>'}render();</script></body></html>
