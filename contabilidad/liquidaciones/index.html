<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Pagos profesionales</title><link rel="stylesheet" href="../assets/style.css"></head><body><div class="layout"><div id="side"></div><div><header><h2>Pagos profesionales</h2><p class="muted">Resumen por profesional.</p></header><main><section class="card"><label>Mes</label><input id="mes" type="month" data-month onchange="render()"><label>Quincena</label><select id="q" onchange="render()"><option value="todas">Todas</option><option value="1">1ª</option><option value="2">2ª</option></select></section><section class="card"><div class="table"><table><thead><tr><th>Profesional</th><th class="right">Atenciones</th><th class="right">Cobrado</th><th class="right">Institución</th><th class="right">Retención</th><th class="right">Líquido</th><th class="right">Pendiente</th></tr></thead><tbody id="tbody"></tbody></table></div></section></main></div></div><script src="../assets/store.js"></script><script>document.getElementById('side').outerHTML=sidebar('../');let db=load();initDates();function render(){let map={};byPeriod(db,$('mes').value,$('q').value).forEach(a=>{let p=a.profesional||'Sin profesional',c=calc(a);map[p]??={n:0,c:0,inst:0,ret:0,liq:0,pend:0};map[p].n++;map[p].c+=c.c;map[p].inst+=c.inst;map[p].ret+=c.ret;map[p].liq+=c.liq;if(!a.liquidado)map[p].pend+=c.liq});let rows=Object.entries(map);$('tbody').innerHTML=rows.length?rows.map(([p,r])=>`<tr><td>${esc(p)}</td><td class="right">${r.n}</td><td class="right">${money(r.c)}</td><td class="right">${money(r.inst)}</td><td class="right">${money(r.ret)}</td><td class="right"><b>${money(r.liq)}</b></td><td class="right"><b>${money(r.pend)}</b></td></tr>`).join(''):'<tr><td colspan="7">Sin datos.</td></tr>'}render();</script></body></html>
