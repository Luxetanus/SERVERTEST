<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Liquidación profesional</title><link rel="stylesheet" href="../assets/style.css?v=20260625b"></head><body><div class="layout"><div id="side"></div><div><header><h2>Liquidación profesional</h2><p class="muted">Selecciona profesional, mes y quincena para revisar el detalle y descargar PDF.</p></header><main><section class="card"><div class="filters"><div><label>Profesional</label><select id="pro" onchange="render()"><option value="todos">Seleccionar</option></select></div><div><label>Mes</label><input id="mes" type="month" data-month onchange="render()"></div><div><label>Quincena</label><select id="q" onchange="render()"><option value="1">1ª quincena</option><option value="2">2ª quincena</option><option value="todas">Mes completo</option></select></div></div><div class="toolbar"><button onclick="descargarPDF()">Descargar PDF</button><button class="ok" onclick="marcarLiquidado()">Marcar como liquidado</button></div></section><section class="card"><h2>Resumen</h2><div class="grid" id="kpis"></div></section><section class="card"><h2>Detalle de atenciones</h2><div class="table"><table><thead><tr><th>Fecha</th><th>Usuario</th><th>Servicio</th><th>Estado</th><th class="right">Cobrado</th><th class="right">Institución</th><th class="right">Retención</th><th class="right">Líquido</th><th>Liquidación</th></tr></thead><tbody id="tbody"></tbody></table></div></section></main></div></div><script src="../assets/store.js?v=20260625b"></script><script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script><script>document.getElementById('side').outerHTML=sidebar('../');let db=load();initDates();function cargarProfesionales(){let pros=[...new Set([...db.profesionales.map(x=>x.nombre),...db.atenciones.map(x=>x.profesional)].filter(Boolean))].sort();$('pro').innerHTML='<option value="todos">Seleccionar profesional</option>'+pros.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('')}function periodoTexto(){let q=$('q').value;if(q==='1')return '1ª quincena';if(q==='2')return '2ª quincena';return 'mes completo'}function filas(){let p=$('pro').value;if(p==='todos')return[];return byPeriod(db,$('mes').value,$('q').value,p).filter(a=>cob(a)>0)}function totales(rows){let r={n:rows.length,c:0,inst:0,ret:0,liq:0,pend:0};rows.forEach(a=>{let x=calc(a);r.c+=x.c;r.inst+=x.inst;r.ret+=x.ret;r.liq+=x.liq;if(!a.liquidado)r.pend+=x.liq});return r}function render(){let rows=filas(),r=totales(rows);$('kpis').innerHTML=`<div class="stat"><span>Atenciones pagadas</span><strong>${r.n}</strong></div><div class="stat ok"><span>Total cobrado</span><strong>${money(r.c)}</strong></div><div class="stat"><span>Ingreso institucional</span><strong>${money(r.inst)}</strong></div><div class="stat"><span>Retención</span><strong>${money(r.ret)}</strong></div><div class="stat warn"><span>Líquido profesional</span><strong>${money(r.liq)}</strong></div><div class="stat bad"><span>Pendiente de liquidar</span><strong>${money(r.pend)}</strong></div>`;$('tbody').innerHTML=rows.length?rows.map(a=>{let x=calc(a);return`<tr><td>${a.fecha}</td><td>${esc(a.usuario)}</td><td>${esc(a.servicio)}</td><td><span class="estado ${a.estado}">${a.estado}</span></td><td class="right">${money(x.c)}</td><td class="right">${money(x.inst)}</td><td class="right">${money(x.ret)}</td><td class="right"><b>${money(x.liq)}</b></td><td>${a.liquidado?'<span class="pill">Liquidada</span>':'<span class="pill">Pendiente</span>'}</td></tr>`}).join(''):'<tr><td colspan="9">Selecciona un profesional con atenciones pagadas en el período.</td></tr>'}function marcarLiquidado(){let rows=filas().filter(a=>!a.liquidado);if(!rows.length)return alert('No hay atenciones pendientes de liquidar.');if(confirm('¿Marcar como liquidado este período para '+$('pro').value+'?')){rows.forEach(a=>a.liquidado=true);save(db);render()}}function descargarPDF(){let rows=filas();if(!rows.length)return alert('No hay datos para generar PDF.');let r=totales(rows),{jsPDF}=window.jspdf,doc=new jsPDF();let y=16,p=$('pro').value,mes=$('mes').value;doc.setFontSize(16);doc.text('Liquidación profesional',14,y);y+=8;doc.setFontSize(10);doc.text('Profesional: '+p,14,y);y+=6;doc.text('Periodo: '+periodoTexto()+' / '+mes,14,y);y+=6;doc.text('Fecha emisión: '+today(),14,y);y+=10;doc.setFontSize(11);doc.text('Resumen',14,y);y+=7;doc.setFontSize(9);[['Atenciones',r.n],['Total cobrado',money(r.c)],['Ingreso institucional',money(r.inst)],['Retención',money(r.ret)],['Líquido profesional',money(r.liq)],['Pendiente',money(r.pend)]].forEach(x=>{doc.text(String(x[0])+': '+String(x[1]),14,y);y+=5});y+=5;doc.setFontSize(9);doc.text('Fecha',14,y);doc.text('Usuario',35,y);doc.text('Servicio',82,y);doc.text('Cobrado',125,y);doc.text('Ret.',150,y);doc.text('Líquido',170,y);y+=5;doc.line(14,y,196,y);y+=5;rows.forEach(a=>{let x=calc(a);if(y>280){doc.addPage();y=16}doc.text(String(a.fecha||''),14,y);doc.text(String(a.usuario||'').slice(0,24),35,y);doc.text(String(a.servicio||'').slice(0,20),82,y);doc.text(money(x.c),125,y);doc.text(money(x.ret),150,y);doc.text(money(x.liq),170,y);y+=6});y+=6;if(y>270){doc.addPage();y=16}doc.setFontSize(8);doc.text('Documento administrativo generado desde el módulo de contabilidad. No constituye comprobante tributario.',14,y);doc.save('liquidacion_'+p.replaceAll(' ','_')+'_'+mes+'_'+$('q').value+'.pdf')}cargarProfesionales();render();</script></body></html>
