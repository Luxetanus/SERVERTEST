<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Reportes</title><link rel="stylesheet" href="../assets/style.css"></head><body><div class="layout"><div id="side"></div><div><header><h2>Reportes y respaldo</h2><p class="muted">Exportación, importación y cierre mensual.</p></header><main><section class="card"><h2>Resumen mensual</h2><label>Mes</label><input id="mes" type="month" data-month onchange="render()"><div class="grid" id="kpis" style="margin-top:14px"></div><button class="ok" onclick="cerrarMes()">Guardar cierre mensual</button></section><section class="card"><h2>Cierres guardados</h2><div class="table"><table><thead><tr><th>Mes</th><th>Fecha</th><th class="right">Cobrado</th><th class="right">Deuda</th><th class="right">Institución</th><th class="right">Egresos</th><th class="right">Saldo</th></tr></thead><tbody id="cierres"></tbody></table></div></section><section class="card"><h2>Respaldo</h2><div class="toolbar"><button onclick="exportJSON()">Exportar JSON</button><button onclick="exportCSV()">Exportar CSV</button><button class="danger" onclick="borrarTodo()">Borrar datos locales</button></div><label>Importar JSON</label><input type="file" accept="application/json" onchange="importJSON(event)"></section></main></div></div><script src="../assets/store.js"></script><script>document.getElementById('side').outerHTML=sidebar('../');let db=load();initDates();function render(){let mes=$('mes').value,r=resumen(byPeriod(db,mes),egByPeriod(db,mes));$('kpis').innerHTML=`<div class="stat ok"><span>Cobrado</span><strong>${money(r.cobrado)}</strong></div><div class="stat bad"><span>Deuda</span><strong>${money(r.deuda)}</strong></div><div class="stat"><span>Institución</span><strong>${money(r.inst)}</strong></div><div class="stat"><span>Egresos</span><strong>${money(r.egresos)}</strong></div><div class="stat"><span>Saldo</span><strong>${money(r.saldo)}</strong></div><div class="stat"><span>Atenciones</span><strong>${r.n}</strong></div>`;$('cierres').innerHTML=db.cierres.length?db.cierres.map(c=>`<tr><td>${c.mes}</td><td>${c.fecha}</td><td class="right">${money(c.cobrado)}</td><td class="right">${money(c.deuda)}</td><td class="right">${money(c.inst)}</td><td class="right">${money(c.egresos)}</td><td class="right"><b>${money(c.saldo)}</b></td></tr>`).join(''):'<tr><td colspan="7">Sin cierres.</td></tr>'}function cerrarMes(){let mes=$('mes').value;if(!mes)return alert('Selecciona mes.');let r=resumen(byPeriod(db,mes),egByPeriod(db,mes));db.cierres.push({id:uid(),mes,fecha:today(),...r});save(db);render()}function exportJSON(){download('respaldo-contabilidad-'+today()+'.json',JSON.stringify(db,null,2),'application/json')}function exportCSV(){let head=['fecha','usuario','profesional','servicio','metodo','estado','arancel','abono','boleta','liquidado'],rows=db.atenciones.map(a=>head.map(k=>'"'+String(a[k]??'').replaceAll('"','""')+'"').join(';'));download('atenciones-'+today()+'.csv',[head.join(';'),...rows].join('\n'),'text/csv')}function importJSON(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{db=JSON.parse(r.result);save(db);render();alert('Importado')};r.readAsText(f)}function borrarTodo(){if(confirm('¿Borrar datos locales?')){localStorage.removeItem(KEY);db=seed();save(db);render()}}render();</script></body></html>
