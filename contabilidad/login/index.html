<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Acceso contabilidad</title><link rel="stylesheet" href="../assets/style.css?v=20260625b"></head><body><main style="max-width:560px;padding-top:56px"><section class="card"><div class="logo">$</div><h1 style="color:#082f75">Acceso contabilidad</h1><p class="muted">Ingresa con el usuario o correo y contraseña registrados en PocketBase.</p><div id="estado" class="alert">Comprobando conexión...</div><label>Usuario o correo</label><input id="identity" autocomplete="username" placeholder="usuario@correo.cl"><label>Contraseña</label><input id="password" type="password" autocomplete="current-password" placeholder="Contraseña"><button onclick="loginContable()">Ingresar al panel</button><p id="msg" class="muted"></p></section></main><script src="../assets/store.js?v=20260625b"></script><script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script><script>const pb=new PocketBase(PB_URL);const msg=$('msg'),estado=$('estado');async function check(){try{await pb.health.check();estado.textContent='PocketBase conectado';if(isAuthenticated())location.href='../'}catch(e){estado.textContent='No se pudo conectar a PocketBase';msg.textContent='Revisa la conexión o el servidor PocketBase.'}}async function loginContable(){msg.textContent='';let identity=$('identity').value.trim(),password=$('password').value;if(!identity||!password){msg.textContent='Ingresa usuario/correo y contraseña.';return}try{await pb.collection('users').authWithPassword(identity,password);location.href='../'}catch(e){msg.textContent='No se pudo iniciar sesión. Revisa usuario, contraseña o permisos del usuario en PocketBase.'}}document.addEventListener('keydown',e=>{if(e.key==='Enter')loginContable()});check();</script></body></html>
