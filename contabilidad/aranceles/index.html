<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Aranceles</title><link rel="stylesheet" href="../assets/style.css"></head><body><div class="layout"><div id="side"></div><div><header><h2>Aranceles</h2><p class="muted">Valores por servicio y modalidad.</p></header><main><section class="card"><label>Servicio</label><input id="serv"><label>Tramo / modalidad</label><input id="tramo"><label>Valor</label><input id="valor" type="number"><label>Observación</label><input id="obs"><button onclick="guardar()">Guardar</button></section><section class="card"><div class="table"><table><thead><tr><th>Servicio</th><th>Tramo</th><th class="right">Valor</th><th>Obs.</th><th>Acciones</th></tr></thead><tbody id="tbody"></tbody></table></div></section></main></div></div><script src="../assets/store.js"></script><script>document.getElementById('side').outerHTML=sidebar('../');let db=load();function guardar(){let a={id:uid(),servicio:$('serv').value.trim(),tramo:$('tramo').value.trim(),valor:n($('valor').value),obs:$('obs').value.trim()};if(!a.servicio)return alert('Ingresa servicio.');db.aranceles.push(a);save(db);['serv','tramo','valor','obs'].forEach(x=>$(x).value='');render()}function borrar(id){db.aranceles=db.aranceles.filter(x=>x.id!==id);save(db);render()}function render(){$('tbody').innerHTML=db.aranceles.length?db.aranceles.map(a=>`<tr><td>${esc(a.servicio)}</td><td>${esc(a.tramo)}</td><td class="right">${money(a.valor)}</td><td>${esc(a.obs)}</td><td><button class="small danger" onclick="borrar('${a.id}')">Eliminar</button></td></tr>`).join(''):'<tr><td colspan="5">Sin registros.</td></tr>'}render();</script></body></html>
