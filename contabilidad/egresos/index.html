<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Egresos</title><link rel="stylesheet" href="../assets/premium.css?v=20260625g"></head><body><div class="sidebar-overlay" onclick="toggleSidebar(false)"></div><div class="app"><aside class="sidebar"><div class="brand"><div class="brand-icon">$</div><div><div class="brand-title">Contabilidad</div><div class="brand-status"><span class="dot"></span>Modo local</div></div></div><nav class="menu"><a class="menu-item" href="../" data-fade><span class="mi">◻</span><span>Panel</span></a><a class="menu-item" href="../atenciones/" data-fade><span class="mi">◉</span><span>Atenciones</span></a><a class="menu-item" href="../caja/" data-fade><span class="mi">⌂</span><span>Caja</span></a><a class="menu-item" href="../deudas/" data-fade><span class="mi">⦿</span><span>Deudas</span></a><a class="menu-item" href="../liquidaciones/" data-fade><span class="mi">⇄</span><span>Pagos prof.</span></a><a class="menu-item active" href="./" data-fade><span class="mi">↘</span><span>Egresos</span></a><a class="menu-item" href="../usuarios/" data-fade><span class="mi">☺</span><span>Usuarios</span></a><a class="menu-item" href="../profesionales/" data-fade><span class="mi">★</span><span>Profesionales</span></a></nav><button class="collapse-btn" onclick="toggleSidebar()">Colapsar</button></aside><main class="main"><div class="topbar"><button class="hamburger" onclick="toggleSidebar(true)">☰</button><div class="top-actions"><button class="top-action" onclick="toggleModoVisual()">◐ Modo claro</button><button class="top-action">👤 <span id="userLabelText">Usuario</span></button><button class="top-action" onclick="logoutContabilidad()">↩ Salir</button></div></div><section class="page-head"><h1>Egresos</h1><p>Registro de gastos institucionales.</p></section><section class="grid2"><article class="panel"><div class="panel-head"><div><h2 class="panel-title">Nuevo egreso</h2><div class="panel-sub">Registra gastos administrativos</div></div></div><div class="panel-body"><div class="grid2"><div><label>Fecha</label><input id="fecha" type="date" data-today><label>Categoría</label><select id="cat"><option>Arriendo</option><option>Contabilidad</option><option>Servicios básicos</option><option>Internet</option><option>Materiales</option><option>Aseo</option><option>Equipamiento</option><option>Impuestos</option><option>Otro</option></select></div><div><label>Descripción</label><input id="desc" placeholder="Descripción del gasto"><label>Monto</label><input id="monto" type="number" placeholder="0"></div></div><div class="toolbar" style="margin-top:16px"><button class="btn btn-primary" onclick="guardar()">Guardar egreso</button></div></div></article><aside class="panel"><div class="panel-head"><div><h2 class="panel-title">Resumen</h2><div class="panel-sub">Total registrado</div></div></div><div class="panel-body"><div id="kpis" class="grid"></div></div></aside></section><section class="panel"><div class="panel-head"><div><h2 class="panel-title">Listado de egresos</h2><div class="panel-sub">Historial de gastos</div></div></div><div class="table-wrap"><table class="table"><thead><tr><th>Fecha</th><th>Categoría</th><th>Descripción</th><th class="right">Monto</th><th>Acciones</th></tr></thead><tbody id="tbody"></tbody></table></div></section></main></div><div id="toastWrap" class="toast-wrap"></div><script src="../assets/store.js?v=20260625g"></script><script src="../assets/premium.js?v=20260625g"></script><script>let db=load();initDates();function guardar(){let e={id:uid(),fecha:$('fecha').value||today(),categoria:$('cat').value,descripcion:$('desc').value.trim(),monto:n($('monto').value)};if(!e.descripcion||!e.monto){toast('error','Campos incompletos','Completa descripción y monto.');return}db.egresos.push(e);save(db);$('desc').value='';$('monto').value='';render();toast('success','Egreso guardado','El gasto fue registrado correctamente.')}function borrar(id){if(confirm('¿Eliminar egreso?')){db.egresos=db.egresos.filter(x=>x.id!==id);save(db);render();toast('success','Egreso eliminado','El registro fue eliminado.')}}function render(){let rows=db.egresos.slice().sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||'')),total=rows.reduce((s,e)=>s+n(e.monto),0);$('kpis').innerHTML=`<div class="kpi bad"><span>Total egresos</span><strong>${money(total)}</strong></div><div class="kpi"><span>Registros</span><strong>${rows.length}</strong></div>`;$('tbody').innerHTML=rows.length?rows.map(e=>`<tr><td>${esc(e.fecha)}</td><td>${esc(e.categoria)}</td><td>${esc(e.descripcion)}</td><td class="right amount">${money(e.monto)}</td><td><button class="btn btn-danger" onclick="borrar('${e.id}')">Eliminar</button></td></tr>`).join(''):'<tr><td colspan="5" class="muted">Sin egresos.</td></tr>'}render();</script></body></html>
