<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Egresos</title><link rel="stylesheet" href="../assets/style.css?v=20260625a"></head><body><div class="layout"><div id="side"></div><div><header><h2>Egresos</h2><p class="muted">Registro de gastos institucionales.</p></header><main><section class="card"><div class="grid2"><div><label>Fecha</label><input id="fecha" type="date" data-today><label>Categoría</label><select id="cat"><option>Arriendo</option><option>Contabilidad</option><option>Servicios básicos</option><option>Internet</option><option>Materiales</option><option>Aseo</option><option>Equipamiento</option><option>Impuestos</option><option>Otro</option></select></div><div><label>Descripción</label><input id="desc"><label>Monto</label><input id="monto" type="number"></div></div><button onclick="guardar()">Guardar egreso</button></section><section class="card"><div class="table"><table><thead><tr><th>Fecha</th><th>Categoría</th><th>Descripción</th><th class="right">Monto</th><th>Acciones</th></tr></thead><tbody id="tbody"></tbody></table></div></section></main></div></div><script src="../assets/store.js?v=20260625a"></script><script>document.getElementById('side').outerHTML=sidebar('../');let db=load();initDates();function guardar(){let e={id:uid(),fecha:$('fecha').value||today(),categoria:$('cat').value,descripcion:$('desc').value.trim(),monto:n($('monto').value)};if(!e.descripcion||!e.monto)return alert('Completa descripción y monto.');db.egresos.push(e);save(db);$('desc').value='';$('monto').value='';render()}function borrar(id){if(confirm('¿Eliminar egreso?')){db.egresos=db.egresos.filter(x=>x.id!==id);save(db);render()}}function render(){let rows=db.egresos.slice().sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));$('tbody').innerHTML=rows.length?rows.map(e=>`<tr><td>${e.fecha}</td><td>${esc(e.categoria)}</td><td>${esc(e.descripcion)}</td><td class="right">${money(e.monto)}</td><td><button class="small danger" onclick="borrar('${e.id}')">Eliminar</button></td></tr>`).join(''):'<tr><td colspan="5">Sin egresos.</td></tr>'}render();</script></body></html>
