services:
  servertest-web:
    build: .
    container_name: servertest-web
    ports:
      - "8085:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
    restart: unless-stopped

  asreview:
    image: ghcr.io/asreview/asreview:latest
    container_name: asreview
    command: lab --host 0.0.0.0 --port 5000
    ports:
      - "5555:5000"
    volumes:
      - /opt/webapps/asreview/data:/project_folder
      - ./asreview/index.html:/root/.local/lib/python3.11/site-packages/asreview/webapp/build/index.html:ro
    restart: unless-stopped
